services:

  web:
    build: .
    restart: always
    ports:
      - "8000:8000"
    networks:
      - poketrip-net
    env_file:
      - .env
    volumes:
      - media_data:/app/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/accounts/login/"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 10s

  nginx:
    image: nginx:latest
    container_name: contenedor_nginx
    profiles:
      - production
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    networks:
      - poketrip-net
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

networks:
  poketrip-net:
    driver: bridge

volumes:
  media_data:
