{% extends 'base_auth.html' %}

{% block title %}Email enviado — PokeTrip{% endblock %}

{% block content %}
<div class="auth-page auth-page--centered">
  <div class="auth-panel auth-panel--solo">
    <div class="auth-form-inner" style="text-align:center;">
      <div style="font-size:3rem;margin-bottom:16px;">📬</div>
      <h2>Revisa tu correo</h2>
      <p class="auth-subtitle">Si el email está registrado, recibirás un enlace para restablecer tu contraseña en breve.</p>
      <p class="auth-footer-note" style="margin-top:24px;">
        <a href="{% url 'login' %}">← Volver al inicio de sesión</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
