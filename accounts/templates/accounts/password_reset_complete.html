{% extends 'base_auth.html' %}

{% block title %}Contraseña restablecida — PokeTrip{% endblock %}

{% block content %}
<div class="auth-page auth-page--centered">
  <div class="auth-panel auth-panel--solo">
    <div class="auth-form-inner" style="text-align:center;">
      <div style="font-size:3rem;margin-bottom:16px;">✅</div>
      <h2>¡Contraseña actualizada!</h2>
      <p class="auth-subtitle">Tu contraseña se ha restablecido correctamente. Ya puedes iniciar sesión.</p>
      <a href="{% url 'login' %}" class="btn-auth-submit" style="display:block;margin-top:24px;text-decoration:none;text-align:center;">
        Iniciar sesión
      </a>
    </div>
  </div>
</div>
{% endblock %}
