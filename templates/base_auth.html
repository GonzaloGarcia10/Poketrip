{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PokeTrip{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="{% static 'accounts/css/styles.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>

<div class="auth-layout">
    <a href="{% url 'home' %}" class="auth-back" aria-label="Volver al inicio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="16" height="16" aria-hidden="true">
            <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span>Volver al inicio</span>
    </a>
    {% if messages %}
    <div class="messages messages--auth">
        {% for message in messages %}
        <div class="message message--{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
</div>

{% block extra_js %}{% endblock %}
<script src="{% static 'js/forms.js' %}"></script>
</body>
</html>
